<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes, viewport-fit=cover" />
  <title>WV_IAs</title>
  <meta name="theme-color" content="#0b0f14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    :root {
      --bg: #0b0f14;
      --panel: rgba(255, 255, 255, .05);
      --panel2: rgba(255, 255, 255, .04);
      --border: rgba(255, 255, 255, .10);
      --border2: rgba(255, 255, 255, .16);
      --text: #eaf0ff;
      --muted: #9aa6bf;
      --shadow: 0 10px 30px rgba(0, 0, 0, .35);
      --radius: 18px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(255, 255, 255, .08), transparent 60%),
        radial-gradient(900px 500px at 10% 20%, rgba(0, 200, 255, .10), transparent 55%),
        radial-gradient(900px 500px at 90% 25%, rgba(255, 120, 0, .10), transparent 60%),
        var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      padding: 12px 8px calc(12px + var(--safe-bottom));
    }

    .wrap {
      width: min(100%, 860px);
      margin: 0 auto;
    }

    header {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: var(--radius);
      padding: 12px 12px 10px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      margin-bottom: 12px;
    }

    .top {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 5vw, 28px);
      letter-spacing: -0.3px;
      display: flex;
      gap: 8px;
      align-items: center;
      font-weight: 700;
    }

    .badge {
      font-size: 11px;
      color: var(--muted);
      border: 1px solid rgba(255, 255, 255, .12);
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .04);
      white-space: nowrap;
      font-weight: 500;
    }

    .actions {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, .04);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 14px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: .15s;
      font-weight: 600;
      font-size: 14px;
      backdrop-filter: blur(4px);
      touch-action: manipulation;
      min-height: 44px;
    }

    button:active {
      transform: scale(.97);
      background: rgba(255, 255, 255, .08);
    }

    .btn-primary {
      border-color: rgba(16, 185, 129, .4);
      background: rgba(16, 185, 129, .15);
    }

    .btn-primary:active {
      background: rgba(16, 185, 129, .25);
    }

    .btn-ghost {
      box-shadow: none;
      background: transparent;
      padding: 8px 10px;
    }

    .tabs {
      margin-top: 10px;
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
      overflow-x: auto;
      padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, .10);
      background: rgba(255, 255, 255, .03);
      color: var(--text);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all .15s;
      touch-action: manipulation;
      min-height: 44px;
      display: flex;
      align-items: center;
    }

    .tab[aria-selected="true"] {
      background: rgba(255, 255, 255, .08);
      border-color: rgba(255, 255, 255, .22);
      font-weight: 700;
    }

    .grid {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    @media (min-width: 640px) {
      .grid {
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
    }

    .card {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 14px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, .10);
      text-decoration: none;
      color: var(--text);
      background: rgba(255, 255, 255, .04);
      box-shadow: var(--shadow);
      transition: transform .15s ease, border-color .15s ease, background .15s;
      cursor: pointer;
      user-select: none;
      touch-action: pan-y;
      backdrop-filter: blur(4px);
      min-height: 76px;
    }

    .card:active {
      transform: scale(.98);
      background: rgba(255, 255, 255, .08);
    }

    .card.dragging {
      opacity: 0.5;
      cursor: grabbing;
    }

    .card.drag-over {
      border: 2px dashed rgba(16, 185, 129, .7);
      background: rgba(16, 185, 129, .15);
    }

    .icon {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      flex: 0 0 48px;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: .2px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, .3);
      border: 1px solid rgba(255, 255, 255, .15);
      background: linear-gradient(135deg, #64748b, #1f2937);
      color: white;
      text-transform: uppercase;
    }

    .label {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    .label strong {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .label span {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0.9;
    }

    .drag-handle {
      cursor: grab;
      font-size: 22px;
      color: var(--muted);
      padding: 4px 6px;
      user-select: none;
      transition: color 0.2s;
      line-height: 1;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .pill {
      font-size: 11px;
      color: var(--muted);
      border: 1px solid rgba(255, 255, 255, .12);
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .03);
      white-space: nowrap;
      font-weight: 500;
    }

    .kebab {
      border: none;
      background: transparent;
      box-shadow: none;
      padding: 8px 10px;
      border-radius: 12px;
      color: rgba(234, 240, 255, .9);
      font-size: 20px;
      cursor: pointer;
      min-height: auto;
      min-width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .kebab:active {
      background: rgba(255, 255, 255, .06);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .65);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 9999;
    }

    .modal {
      width: min(560px, 100%);
      background: #0e151e;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, .5);
      padding: 18px 16px;
      max-height: 85vh;
      overflow-y: auto;
    }

    .modal h2 {
      margin: 0 0 16px;
      font-size: 20px;
      font-weight: 700;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    @media (min-width: 520px) {
      .row.two {
        grid-template-columns: 1fr 1fr;
      }
    }

    label {
      font-size: 12px;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    input,
    select {
      width: 100%;
      padding: 14px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, .12);
      background: rgba(255, 255, 255, .04);
      color: var(--text);
      outline: none;
      font-size: 16px;
      transition: border .15s;
      -webkit-appearance: none;
      appearance: none;
    }

    input:focus,
    select:focus {
      border-color: rgba(255, 255, 255, .28);
    }

    .modal-actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .danger {
      border-color: rgba(239, 68, 68, .4);
      background: rgba(239, 68, 68, .1);
    }

    .danger:active {
      background: rgba(239, 68, 68, .2);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(20px, calc(12px + var(--safe-bottom)));
      transform: translateX(-50%);
      background: rgba(15, 22, 32, .98);
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 999px;
      padding: 12px 20px;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .5);
      display: none;
      z-index: 10000;
      max-width: min(520px, 92vw);
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .drag-info {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 16px;
      padding: 10px;
      background: rgba(255, 255, 255, .03);
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, .06);
    }

    @media (max-width: 420px) {
      body {
        padding: 8px 4px calc(8px + var(--safe-bottom));
      }
      .badge, .pill {
        display: inline-block;
      }
      #btnExport, #btnImport, #btnReset {
        display: inline-flex !important;
      }
      .drag-handle {
        display: flex;
      }
      .card {
        padding: 12px;
      }
      .icon {
        width: 44px;
        height: 44px;
        flex-basis: 44px;
        font-size: 16px;
      }
      .label strong {
        font-size: 15px;
      }
      button {
        padding: 8px 10px;
        font-size: 13px;
        min-height: 42px;
      }
      .tab {
        padding: 8px 12px;
        font-size: 12px;
        min-height: 42px;
      }
    }

    .card, button, .tab, .kebab {
      touch-action: manipulation;
    }

    select {
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%239aa6bf" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
      background-repeat: no-repeat;
      background-position: right 14px center;
      background-size: 16px;
      padding-right: 40px;
    }
  </style>

  <style id="wv-splash-css">
    #splash-screen { 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100vw; 
      height: 100vh; 
      background-color: #0d1117; 
      display: flex; 
      flex-direction: column; 
      justify-content: center; 
      align-items: center; 
      z-index: 999999; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      transition: opacity 0.5s ease; 
    }
    .splash-container { 
      border: 2px solid #58a6ff; 
      padding: 40px 60px; 
      text-align: center; 
      border-radius: 8px; 
      background-color: #0d1117; 
      box-shadow: 0 0 20px rgba(88, 166, 255, 0.2); 
    }
    .splash-icon { font-size: 60px; color: #79c0ff; margin-bottom: 10px; }
    .splash-title { color: #c9d1d9; font-size: 24px; font-weight: bold; margin: 10px 0 5px 0; }
    .splash-sub1 { color: #58a6ff; font-size: 14px; font-weight: bold; margin: 0; }
    .splash-sub2 { color: #79c0ff; font-size: 12px; margin: 5px 0 15px 0; }
    .splash-load-text { color: #c9d1d9; font-size: 12px; margin-bottom: 8px; }
    .progress-bar { width: 260px; height: 12px; background-color: #30363d; border-radius: 6px; overflow: hidden; margin: 0 auto; position: relative; }
    .progress-fill { width: 50%; height: 100%; background-color: #58a6ff; border-radius: 6px; position: absolute; animation: loadingBar 1.5s infinite ease-in-out; }
    @keyframes loadingBar { 0% { left: -50%; } 50% { left: 100%; } 100% { left: -50%; } }
  </style>
</head>
<body>

<div id="splash-screen">
  <div class="splash-container">
    <div class="splash-icon">⚡</div>
    <h1 class="splash-title">WV_Desenvolvedor de Software</h1>
    <p class="splash-sub1">Wellington Viana</p>
    <p class="splash-sub2">@wellingtonviana.pego</p>
    <p class="splash-load-text">Inicializando sistema...</p>
    <div class="progress-bar"><div class="progress-fill"></div></div>
  </div>
</div>

<main class="wrap">
  <header>
    <div class="top">
      <h1>WV_IAs <span class="badge" id="countBadge">0 IAs</span></h1>
      <div class="actions">
        <button class="btn-primary" id="btnAdd">+ Adicionar</button>
        <button id="btnExport">Exportar</button>
        <button id="btnImport">Importar</button>
        <button class="btn-ghost" id="btnReset" title="Restaurar padrão">↺</button>
      </div>
    </div>
    <div class="tabs" role="tablist" aria-label="Categorias">
      <div class="tab" role="tab" tabindex="0" data-tab="all" aria-selected="true">Tudo</div>
      <div class="tab" role="tab" tabindex="0" data-tab="texto">IA Texto</div>
      <div class="tab" role="tab" tabindex="0" data-tab="imagem">IA Imagem</div>
      <div class="tab" role="tab" tabindex="0" data-tab="codigo">IA Código</div>
      <div class="tab" role="tab" tabindex="0" data-tab="util">Utilitários</div>
    </div>
  </header>

  <section class="grid" id="grid" aria-label="Lista de IAs"></section>
  <div class="drag-info">🖱️ Arraste os cards para reordenar</div>
</main>

<div class="modal-backdrop" id="modalBg" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <h2 id="modalTitle">Adicionar IA</h2>
    <div class="row two">
      <div><label>Nome</label><input id="fName" placeholder="Ex: Claude, Perplexity..." /></div>
      <div><label>Categoria</label>
        <select id="fCat">
          <option value="texto">IA Texto</option>
          <option value="imagem">IA Imagem</option>
          <option value="codigo">IA Código</option>
          <option value="util">Utilitários</option>
        </select>
      </div>
    </div>
    <div class="row"><div><label>Link (URL)</label><input id="fUrl" placeholder="https://..." inputmode="url" /></div></div>
    <div class="row two">
      <div><label>Cor do botão</label><input id="fColor" placeholder="#10b981" /></div>
      <div><label>Ícone (2–3 letras)</label><input id="fIcon" placeholder="Ex: AI" maxlength="3" /></div>
    </div>
    <div class="modal-actions">
      <button id="btnCancel">Cancelar</button>
      <button class="danger" id="btnDelete" style="display:none;">Excluir</button>
      <button class="btn-primary" id="btnSave">Salvar</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  (function(){
    "use strict";

    // IMPORTANTE: Mantendo a mesma chave V3 para não perder seus links salvos no Kodular
    const STORAGE_KEY = "WV_IAS_LIST_SINGLEHTML_V3";
    
    // Função para abrir links de forma compatível com Kodular
    function openLink(url) {
      if (!url || !url.startsWith('http')) {
        toast("Link inválido!");
        return false;
      }
      
      // Método para Kodular WebView
      try {
        // Tenta usar o esquema de intent do Android
        if (window.Kodular && window.Kodular.openURL) {
          window.Kodular.openURL(url);
          return true;
        }
        
        // Método alternativo para WebView
        if (window.location && window.location.href) {
          window.location.href = url;
          return true;
        }
      } catch(e) {
        console.log("Erro ao abrir link:", e);
      }
      
      // Fallback: criar link e clicar
      const link = document.createElement('a');
      link.href = url;
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      link.click();
      
      return true;
    }

    const DEFAULT_ITEMS = [
      {id: crypto.randomUUID(), name:"ChatGPT", url:"https://chatgpt.com/", cat:"texto", color:"#10b981", icon:"GPT"},
      {id: crypto.randomUUID(), name:"DeepSeek", url:"https://chat.deepseek.com/", cat:"codigo", color:"#f97316", icon:"DS"},
      {id: crypto.randomUUID(), name:"Grok", url:"https://grok.com/", cat:"texto", color:"#ef4444", icon:"X"},
      {id: crypto.randomUUID(), name:"Google AI Studio", url:"https://aistudio.google.com/prompts/new_chat", cat:"codigo", color:"#00d2ff", icon:"AI"},
      {id: crypto.randomUUID(), name:"Gemini", url:"https://gemini.google.com/app", cat:"texto", color:"#7c3aed", icon:"G"},
      {id: crypto.randomUUID(), name:"Claude", url:"https://claude.ai", cat:"texto", color:"#d97706", icon:"CL"},
      {id: crypto.randomUUID(), name:"Microsoft Copilot", url:"https://copilot.microsoft.com", cat:"texto", color:"#00a4ef", icon:"CP"},
      {id: crypto.randomUUID(), name:"Perplexity AI", url:"https://perplexity.ai", cat:"texto", color:"#3b82f6", icon:"PX"},
      {id: crypto.randomUUID(), name:"HuggingChat", url:"https://huggingface.co/chat", cat:"texto", color:"#f9d423", icon:"HC"},
      {id: crypto.randomUUID(), name:"Poe", url:"https://poe.com", cat:"texto", color:"#6366f1", icon:"PO"},
      {id: crypto.randomUUID(), name:"You.com", url:"https://you.com", cat:"texto", color:"#06b6d4", icon:"YO"},
      {id: crypto.randomUUID(), name:"Blackbox AI", url:"https://www.blackbox.ai", cat:"codigo", color:"#1e293b", icon:"BB"},
      {id: crypto.randomUUID(), name:"Phind", url:"https://www.phind.com", cat:"codigo", color:"#a855f7", icon:"PH"},
      {id: crypto.randomUUID(), name:"Codeium", url:"https://codeium.com", cat:"codigo", color:"#22c55e", icon:"CD"},
      {id: crypto.randomUUID(), name:"Tabnine", url:"https://www.tabnine.com", cat:"codigo", color:"#ec489a", icon:"TN"},
      {id: crypto.randomUUID(), name:"Cody", url:"https://sourcegraph.com/cody", cat:"codigo", color:"#f97316", icon:"CY"},
      {id: crypto.randomUUID(), name:"Replit AI", url:"https://replit.com", cat:"codigo", color:"#6366f1", icon:"RP"},
      {id: crypto.randomUUID(), name:"Leonardo AI", url:"https://leonardo.ai", cat:"imagem", color:"#a855f7", icon:"LE"},
      {id: crypto.randomUUID(), name:"Playground AI", url:"https://playgroundai.com", cat:"imagem", color:"#14b8a6", icon:"PG"},
      {id: crypto.randomUUID(), name:"Krea AI", url:"https://krea.ai", cat:"imagem", color:"#f97316", icon:"KR"},
      {id: crypto.randomUUID(), name:"Ideogram", url:"https://ideogram.ai", cat:"imagem", color:"#ec489a", icon:"ID"},
      {id: crypto.randomUUID(), name:"Clipdrop", url:"https://clipdrop.co", cat:"imagem", color:"#3b82f6", icon:"CD"},
      {id: crypto.randomUUID(), name:"Remove.bg", url:"https://remove.bg", cat:"imagem", color:"#8b5cf6", icon:"BG"},
      {id: crypto.randomUUID(), name:"Notion AI", url:"https://notion.so", cat:"util", color:"#000000", icon:"NT"},
      {id: crypto.randomUUID(), name:"Grammarly", url:"https://grammarly.com", cat:"util", color:"#15c39a", icon:"GM"},
      {id: crypto.randomUUID(), name:"Otter.ai", url:"https://otter.ai", cat:"util", color:"#0891b2", icon:"OT"},
      {id: crypto.randomUUID(), name:"Canva Magic", url:"https://canva.com", cat:"util", color:"#00c4cc", icon:"CV"},
      {id: crypto.randomUUID(), name:"Tome", url:"https://tome.app", cat:"util", color:"#8b5cf6", icon:"TM"},
      {id: crypto.randomUUID(), name:"Gamma", url:"https://gamma.app", cat:"util", color:"#f59e0b", icon:"GA"}
    ];

    function safeHost(url){ 
      try { 
        const host = (new URL(url)).host;
        return host.replace(/^www\./, '');
      } catch(e){ 
        return ""; 
      } 
    }

    function loadItems(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return DEFAULT_ITEMS.map(x => ({ ...x, host: safeHost(x.url) }));
        const data = JSON.parse(raw);
        if(!Array.isArray(data)) throw new Error("invalid");
        return data.map(x => ({
          id: (x.id && String(x.id)) || crypto.randomUUID(),
          name: String(x.name || "IA"),
          url: String(x.url || ""),
          cat: (x.cat==="texto"||x.cat==="imagem"||x.cat==="codigo"||x.cat==="util") ? x.cat : "texto",
          color: String(x.color || "#10b981"),
          icon: String(x.icon || "AI").slice(0,3).toUpperCase(),
          host: safeHost(String(x.url || "")),
        })).filter(x => x.url.startsWith("http"));
      }catch(e){
        return DEFAULT_ITEMS.map(x => ({ ...x, host: safeHost(x.url) }));
      }
    }

    function saveItems(items){ 
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); 
    }

    const grid = document.getElementById("grid");
    const countBadge = document.getElementById("countBadge");
    let items = loadItems();
    let activeTab = "all";
    let draggedItem = null;

    function toast(msg){
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.style.display = "block";
      clearTimeout(window.__tto);
      window.__tto = setTimeout(() => t.style.display = "none", 2000);
    }

    function catLabel(cat){
      if(cat==="texto") return "💬 IA Texto";
      if(cat==="imagem") return "🎨 IA Imagem";
      if(cat==="codigo") return "💻 IA Código";
      if(cat==="util") return "🛠️ Utilitários";
      return "—";
    }

    function reorderItems(dragIndex, dropIndex) {
      const newItems = [...items];
      const [removed] = newItems.splice(dragIndex, 1);
      newItems.splice(dropIndex, 0, removed);
      items = newItems;
      saveItems(items);
      render();
      toast("Ordem atualizada!");
    }

    function handleCardClick(it, event) {
      event.preventDefault();
      event.stopPropagation();
      
      if (it && it.url) {
        openLink(it.url);
      } else {
        toast("Link não disponível!");
      }
    }

    function render(){
      const filtered = items.filter(it => activeTab === "all" ? true : it.cat === activeTab);
      grid.innerHTML = "";
      
      filtered.forEach((it) => {
        const originalIndex = items.findIndex(item => item.id === it.id);
        
        const card = document.createElement("div");
        card.className = "card";
        card.setAttribute("data-id", it.id);
        card.setAttribute("data-index", originalIndex);
        card.setAttribute("data-url", it.url);
        
        // Evento de clique para abrir o link
        card.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          handleCardClick(it, e);
        });
        
        // Drag and drop
        card.setAttribute("draggable", "true");
        
        card.addEventListener("dragstart", (e) => {
          draggedItem = card;
          e.dataTransfer.setData("text/plain", it.id);
          e.dataTransfer.effectAllowed = "move";
          card.classList.add("dragging");
        });
        
        card.addEventListener("dragend", () => {
          card.classList.remove("dragging");
          document.querySelectorAll(".card").forEach(c => c.classList.remove("drag-over"));
          draggedItem = null;
        });
        
        card.addEventListener("dragover", (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = "move";
          if (draggedItem !== card) card.classList.add("drag-over");
        });
        
        card.addEventListener("dragleave", () => card.classList.remove("drag-over"));
        
        card.addEventListener("drop", (e) => {
          e.preventDefault();
          e.stopPropagation();
          card.classList.remove("drag-over");
          if (!draggedItem || draggedItem === card) return;
          const dragId = draggedItem.getAttribute("data-id");
          const dropId = card.getAttribute("data-id");
          const dragIndex = items.findIndex(item => item.id === dragId);
          const dropIndex = items.findIndex(item => item.id === dropId);
          if (dragIndex !== -1 && dropIndex !== -1 && dragIndex !== dropIndex) {
            reorderItems(dragIndex, dropIndex);
          }
        });
        
        const icon = document.createElement("div");
        icon.className = "icon";
        icon.style.background = `linear-gradient(135deg, ${it.color}, #1f2937)`;
        icon.textContent = (it.icon || "AI").toUpperCase();
        
        const label = document.createElement("div");
        label.className = "label";
        
        const strong = document.createElement("strong");
        strong.textContent = it.name;
        
        const span = document.createElement("span");
        span.textContent = it.host || safeHost(it.url);
        
        label.appendChild(strong);
        label.appendChild(span);
        
        const meta = document.createElement("div");
        meta.className = "meta";
        
        const dragHandle = document.createElement("div");
        dragHandle.className = "drag-handle";
        dragHandle.innerHTML = "⋮⋮";
        dragHandle.title = "Arraste para reorganizar";
        dragHandle.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
        });
        
        const pill = document.createElement("div");
        pill.className = "pill";
        pill.textContent = catLabel(it.cat);
        
        const kebab = document.createElement("button");
        kebab.className = "kebab";
        kebab.type = "button";
        kebab.textContent = "⋮";
        kebab.title = "Editar/Excluir";
        kebab.addEventListener("click", (ev) => {
          ev.preventDefault();
          ev.stopPropagation();
          openModal(it.id);
        });
        
        meta.appendChild(dragHandle);
        meta.appendChild(pill);
        meta.appendChild(kebab);
        
        card.appendChild(icon);
        card.appendChild(label);
        card.appendChild(meta);
        
        grid.appendChild(card);
      });
      
      countBadge.textContent = `${items.length} IAs`;
    }

    function setTab(tab){
      activeTab = tab;
      document.querySelectorAll(".tab").forEach(t => {
        t.setAttribute("aria-selected", t.dataset.tab === tab ? "true" : "false");
      });
      render();
    }

    document.querySelectorAll(".tab").forEach(t => {
      t.addEventListener("click", () => setTab(t.dataset.tab));
      t.addEventListener("keydown", (e) => { if(e.key==="Enter"||e.key===" ") setTab(t.dataset.tab); });
    });

    const modalBg = document.getElementById("modalBg");
    const modalTitle = document.getElementById("modalTitle");
    const fName = document.getElementById("fName");
    const fUrl  = document.getElementById("fUrl");
    const fCat  = document.getElementById("fCat");
    const fColor= document.getElementById("fColor");
    const fIcon = document.getElementById("fIcon");
    const btnDelete = document.getElementById("btnDelete");
    let editingId = null;

    function openModal(id=null){
      editingId = id;
      if(id){
        const it = items.find(x => x.id === id);
        modalTitle.textContent = "Editar IA";
        fName.value = it?.name || "";
        fUrl.value  = it?.url || "";
        fCat.value  = it?.cat || "texto";
        fColor.value= it?.color || "#10b981";
        fIcon.value = it?.icon || "AI";
        btnDelete.style.display = "inline-block";
      } else {
        modalTitle.textContent = "Adicionar IA";
        fName.value = "";
        fUrl.value  = "";
        fCat.value  = "texto";
        fColor.value= "#10b981";
        fIcon.value = "AI";
        btnDelete.style.display = "none";
      }
      modalBg.style.display = "flex";
      setTimeout(() => fName.focus(), 60);
    }

    function closeModal(){ modalBg.style.display = "none"; editingId = null; }

    document.getElementById("btnAdd").addEventListener("click", () => openModal(null));
    document.getElementById("btnCancel").addEventListener("click", closeModal);
    modalBg.addEventListener("click", (e) => { if(e.target === modalBg) closeModal(); });

    document.getElementById("btnSave").addEventListener("click", () => {
      const name = (fName.value || "").trim();
      const url = (fUrl.value || "").trim();
      const cat = fCat.value;
      const color = (fColor.value || "").trim() || "#10b981";
      const icon = (fIcon.value || "AI").trim().slice(0,3).toUpperCase();
      if(!name){ toast("Preencha o nome."); return; }
      if(!url || !url.startsWith("http")){ toast("Link deve começar com https://"); return; }
      if(editingId){
        items = items.map(it => it.id === editingId ? {...it, name, url, cat, color, icon, host: safeHost(url)} : it);
        toast("IA atualizada.");
      } else {
        items.unshift({id: crypto.randomUUID(), name, url, cat, color, icon, host: safeHost(url)});
        toast("IA adicionada.");
      }
      saveItems(items);
      closeModal();
      render();
    });

    btnDelete.addEventListener("click", () => {
      if(!editingId) return;
      const it = items.find(x => x.id === editingId);
      if(!confirm(`Excluir "${it?.name || "IA"}"?`)) return;
      items = items.filter(x => x.id !== editingId);
      saveItems(items);
      closeModal();
      render();
      toast("IA excluída.");
    });

    document.getElementById("btnExport").addEventListener("click", () => {
      const data = JSON.stringify(items, null, 2);
      const blob = new Blob([data], {type: "application/json"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "WV_IAs_backup.json";
      a.click();
      URL.revokeObjectURL(a.href);
      toast("Backup exportado.");
    });

    document.getElementById("btnImport").addEventListener("click", () => {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = "application/json";
      input.onchange = () => {
        const file = input.files?.[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try{
            const data = JSON.parse(reader.result);
            if(!Array.isArray(data)) throw new Error("Formato inválido");
            items = data.map(x => ({
              id: (x.id && String(x.id)) || crypto.randomUUID(),
              name: String(x.name || "IA"),
              url: String(x.url || ""),
              cat: (x.cat==="texto"||x.cat==="imagem"||x.cat==="codigo"||x.cat==="util") ? x.cat : "texto",
              color: String(x.color || "#10b981"),
              icon: String(x.icon || "AI").slice(0,3).toUpperCase(),
              host: safeHost(String(x.url || "")),
            })).filter(x => x.url.startsWith("http"));
            saveItems(items);
            render();
            toast("Importado com sucesso.");
          }catch(e){
            toast("Falha ao importar (arquivo inválido).");
          }
        };
        reader.readAsText(file);
      };
      input.click();
    });

    document.getElementById("btnReset").addEventListener("click", () => {
      if(!confirm("Restaurar lista padrão? Isso vai apagar todos os seus links adicionados!")) return;
      items = DEFAULT_ITEMS.map(x => ({ ...x, host: safeHost(x.url) }));
      saveItems(items);
      render();
      toast("Lista padrão restaurada!");
    });

    // Salvar e renderizar
    saveItems(items);
    render();
  })();
</script>

<script id="wv-splash-js">
  window.addEventListener('load', function() {
    setTimeout(function() {
      var splash = document.getElementById('splash-screen');
      if(splash) {
        splash.style.opacity = '0';
        setTimeout(function() { splash.style.display = 'none'; }, 500);
      }
    }, 2600);
  });
</script>
